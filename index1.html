<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Space Shooter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    h1 {
      position: absolute;
      top: 10px; left: 50%;
      transform: translateX(-50%);
      color: #ffffff;
      font-size: 1.5rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 1;
      text-shadow: 0 0 12px #44aaff;
      white-space: nowrap;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
    }

    /* ── Mobile HUD ────────────────────────────────────────────────────── */
    #mobileHUD {
      display: none;
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* Joystick zone */
    #joystickZone {
      position: absolute;
      left: 20px;
      bottom: 28px;
      width: 130px;
      height: 130px;
      pointer-events: all;
      touch-action: none;
    }
    #joystickBase {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(100,180,255,0.35);
      backdrop-filter: blur(2px);
    }
    #joystickKnob {
      position: absolute;
      width: 50px; height: 50px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(120,200,255,0.85), rgba(30,80,200,0.7));
      border: 2px solid rgba(160,220,255,0.7);
      box-shadow: 0 0 14px rgba(60,140,255,0.6);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      transition: box-shadow 0.1s;
    }

    /* Fire button */
    #fireBtn {
      position: absolute;
      right: 28px;
      bottom: 38px;
      width: 82px;
      height: 82px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, rgba(255,120,60,0.9), rgba(180,30,0,0.8));
      border: 2.5px solid rgba(255,160,80,0.8);
      box-shadow: 0 0 18px rgba(255,80,0,0.55);
      pointer-events: all;
      touch-action: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      color: #fff;
      text-shadow: 0 0 8px #ff8800;
      transition: transform 0.08s, box-shadow 0.08s;
      -webkit-tap-highlight-color: transparent;
    }
    #fireBtn:active, #fireBtn.pressed {
      transform: scale(0.9);
      box-shadow: 0 0 28px rgba(255,120,0,0.9);
    }

    /* Pause button */
    #pauseBtn {
      position: absolute;
      right: 14px;
      top: 14px;
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(180,220,255,0.4);
      pointer-events: all;
      touch-action: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <h1>Space Shooter</h1>
  <canvas id="gameCanvas"></canvas>

  <!-- Mobile on-screen controls -->
  <div id="mobileHUD">
    <div id="joystickZone">
      <div id="joystickBase"></div>
      <div id="joystickKnob"></div>
    </div>
    <button id="fireBtn">🔥</button>
    <button id="pauseBtn">⏸</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');

    // ── Resize to fill the full screen ───────────────────────────────────────
    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', () => {
      resizeCanvas();
      // Re-clamp ship after resize
      if (typeof ship !== 'undefined') {
        ship.x = Math.min(Math.max(ship.x, ship.width / 2), canvas.width  - ship.width / 2);
        ship.y = Math.min(Math.max(ship.y, ship.height / 2), canvas.height - ship.height / 2);
      }
    });

    // ── Audio state — declared early so keydown can reference it ─────────────
    let audioCtx   = null;
    let bgmPlaying = false;

    // ─── Deep Space Background ────────────────────────────────────────────────
    // Nebula cloud layer — generated once into an offscreen canvas
    let nebulaCanvas = null;
    function buildNebulaCanvas() {
      nebulaCanvas = document.createElement('canvas');
      nebulaCanvas.width  = canvas.width  || window.innerWidth;
      nebulaCanvas.height = canvas.height || window.innerHeight;
      const nc = nebulaCanvas.getContext('2d');
      // Deep space base gradient
      const bg = nc.createLinearGradient(0, 0, 0, nebulaCanvas.height);
      bg.addColorStop(0,    '#00000a');
      bg.addColorStop(0.35, '#03000f');
      bg.addColorStop(0.65, '#000510');
      bg.addColorStop(1,    '#000008');
      nc.fillStyle = bg;
      nc.fillRect(0, 0, nebulaCanvas.width, nebulaCanvas.height);

      // Galaxy smear (distant spiral hint)
      const gx = nebulaCanvas.width  * 0.72;
      const gy = nebulaCanvas.height * 0.28;
      const galG = nc.createRadialGradient(gx, gy, 0, gx, gy, nebulaCanvas.width * 0.22);
      galG.addColorStop(0,   'rgba(200,180,255,0.07)');
      galG.addColorStop(0.3, 'rgba(120,80,200,0.045)');
      galG.addColorStop(0.7, 'rgba(60,30,120,0.02)');
      galG.addColorStop(1,   'rgba(0,0,0,0)');
      nc.save();
      nc.translate(gx, gy);
      nc.rotate(0.38);
      nc.scale(1.9, 0.55);
      nc.translate(-gx, -gy);
      nc.beginPath();
      nc.arc(gx, gy, nebulaCanvas.width * 0.22, 0, Math.PI * 2);
      nc.fillStyle = galG;
      nc.fill();
      nc.restore();

      // Nebula blobs — coloured gas clouds
      const nebulae = [
        { x: 0.18, y: 0.22, rx: 0.28, ry: 0.18, rot: -0.3,  c0: 'rgba(60,0,120,0.13)',  c1: 'rgba(20,0,60,0.04)'  },
        { x: 0.75, y: 0.55, rx: 0.32, ry: 0.20, rot:  0.5,  c0: 'rgba(0,40,100,0.11)',  c1: 'rgba(0,15,50,0.03)'  },
        { x: 0.45, y: 0.75, rx: 0.25, ry: 0.15, rot:  0.15, c0: 'rgba(80,0,60,0.10)',   c1: 'rgba(30,0,20,0.03)'  },
        { x: 0.85, y: 0.12, rx: 0.18, ry: 0.12, rot: -0.6,  c0: 'rgba(0,60,80,0.09)',   c1: 'rgba(0,20,30,0.02)'  },
        { x: 0.30, y: 0.50, rx: 0.20, ry: 0.13, rot:  0.8,  c0: 'rgba(100,20,0,0.07)',  c1: 'rgba(40,5,0,0.02)'   },
      ];
      for (const n of nebulae) {
        const nx = n.x * nebulaCanvas.width;
        const ny = n.y * nebulaCanvas.height;
        const rx = n.rx * nebulaCanvas.width;
        const ry = n.ry * nebulaCanvas.height;
        const ng = nc.createRadialGradient(nx, ny, 0, nx, ny, Math.max(rx, ry));
        ng.addColorStop(0, n.c0);
        ng.addColorStop(1, n.c1);
        nc.save();
        nc.translate(nx, ny); nc.rotate(n.rot); nc.scale(rx / Math.max(rx,ry), ry / Math.max(rx,ry));
        nc.beginPath();
        nc.arc(0, 0, Math.max(rx, ry), 0, Math.PI * 2);
        nc.fillStyle = ng; nc.fill();
        nc.restore();
      }

      // Dust band across middle
      const dustG = nc.createLinearGradient(0, nebulaCanvas.height * 0.42, 0, nebulaCanvas.height * 0.60);
      dustG.addColorStop(0,   'rgba(255,200,100,0)');
      dustG.addColorStop(0.5, 'rgba(255,200,100,0.018)');
      dustG.addColorStop(1,   'rgba(255,200,100,0)');
      nc.fillStyle = dustG;
      nc.fillRect(0, nebulaCanvas.height * 0.42, nebulaCanvas.width, nebulaCanvas.height * 0.18);
    }

    // Rebuild nebula when canvas resizes
    window.addEventListener('resize', () => { nebulaCanvas = null; });

    // ─── Starfield — three parallax layers ────────────────────────────────────
    // Layer 0: tiny distant stars (fast scroll = near illusion handled by slow speed)
    // Layer 1: mid stars
    // Layer 2: bright close stars with cross flares
    const STAR_LAYERS = [
      { count: 280, minR: 0.2, maxR: 0.6,  minSpd: 0.15, maxSpd: 0.4,  colors: ['255,255,255','200,210,255','255,240,200'] },
      { count: 120, minR: 0.5, maxR: 1.1,  minSpd: 0.4,  maxSpd: 0.85, colors: ['255,255,255','180,200,255','255,220,180','200,255,220'] },
      { count:  40, minR: 1.0, maxR: 2.2,  minSpd: 0.7,  maxSpd: 1.4,  colors: ['255,255,255','160,190,255','255,200,160','150,230,255'] },
    ];
    const starLayers = STAR_LAYERS.map(cfg => {
      const arr = [];
      for (let i = 0; i < cfg.count; i++) {
        const col = cfg.colors[Math.floor(Math.random() * cfg.colors.length)];
        arr.push({
          x:      Math.random() * (canvas.width  || window.innerWidth),
          y:      Math.random() * (canvas.height || window.innerHeight),
          r:      cfg.minR + Math.random() * (cfg.maxR - cfg.minR),
          speed:  cfg.minSpd + Math.random() * (cfg.maxSpd - cfg.minSpd),
          col,
          twinkle: Math.random() * Math.PI * 2,
          flare:   Math.random() < 0.3   // only some bright stars get cross flare
        });
      }
      return arr;
    });

    function updateStars() {
      for (const layer of starLayers) {
        for (const star of layer) {
          star.y += star.speed;
          if (star.y > canvas.height + 4) {
            star.y = -4;
            star.x = Math.random() * canvas.width;
          }
        }
      }
    }

    function drawStars() {
      if (!nebulaCanvas ||
          nebulaCanvas.width  !== canvas.width ||
          nebulaCanvas.height !== canvas.height) {
        buildNebulaCanvas();
      }

      // 1. Deep space backdrop
      ctx.drawImage(nebulaCanvas, 0, 0);

      const time = Date.now() / 1000;

      // 2. Three parallax star layers
      for (let li = 0; li < starLayers.length; li++) {
        const layer = starLayers[li];
        for (const star of layer) {
          const twinkle = 0.55 + 0.45 * Math.sin(time * (1.8 + li * 0.6) + star.twinkle);
          const alpha   = (0.4 + 0.6 * twinkle) * (li === 0 ? 0.7 : li === 1 ? 0.85 : 1.0);

          // Glow halo for bright layer
          if (li === 2) {
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.r * 2.8, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${star.col},${alpha * 0.18})`;
            ctx.fill();
          }

          // Star disc
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${star.col},${alpha})`;
          ctx.fill();

          // Cross-flare for bright stars
          if (li === 2 && star.flare) {
            const flen = star.r * (4 + 3 * twinkle);
            const fa   = alpha * 0.55;
            ctx.strokeStyle = `rgba(${star.col},${fa})`;
            ctx.lineWidth   = star.r * 0.5;
            // Horizontal
            ctx.beginPath();
            ctx.moveTo(star.x - flen, star.y);
            ctx.lineTo(star.x + flen, star.y);
            ctx.stroke();
            // Vertical
            ctx.beginPath();
            ctx.moveTo(star.x, star.y - flen);
            ctx.lineTo(star.x, star.y + flen);
            ctx.stroke();
            // Diagonal (softer)
            ctx.strokeStyle = `rgba(${star.col},${fa * 0.4})`;
            ctx.lineWidth   = star.r * 0.3;
            const dlen = flen * 0.55;
            ctx.beginPath();
            ctx.moveTo(star.x - dlen, star.y - dlen);
            ctx.lineTo(star.x + dlen, star.y + dlen);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(star.x + dlen, star.y - dlen);
            ctx.lineTo(star.x - dlen, star.y + dlen);
            ctx.stroke();
          }
        }
      }

      // 3. Slow-drifting space dust overlay (subtle noise texture)
      const dustT = (time * 6) % canvas.height;
      const dustGrad = ctx.createLinearGradient(0, dustT - 40, 0, dustT + 40);
      dustGrad.addColorStop(0,   'rgba(180,160,255,0)');
      dustGrad.addColorStop(0.5, 'rgba(180,160,255,0.012)');
      dustGrad.addColorStop(1,   'rgba(180,160,255,0)');
      ctx.fillStyle = dustGrad;
      ctx.fillRect(0, Math.max(0, dustT - 40), canvas.width, 80);
    }

    // ─── Player ship ──────────────────────────────────────────────────────────
    const ship = {
      x:          canvas.width / 2,
      y:          canvas.height - 80,
      width:      40,
      height:     50,
      speed:      5,
      invincible: 0
    };

    // ─── Input ────────────────────────────────────────────────────────────────
    const keys = {};
    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) {
        e.preventDefault();
      }
      // Start BGM on first interaction (browser autoplay policy)
      if (!bgmPlaying && !gameOver) startBGM();
    });
    document.addEventListener('keyup', (e) => { keys[e.key] = false; });

    // ─── Mobile / Touch input ─────────────────────────────────────────────────
    const isMobile = () => ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    // Virtual joystick state
    const joy = { dx: 0, dy: 0, active: false, id: null, baseX: 0, baseY: 0 };
    let   touchFiring = false;   // fire button held

    function initMobileHUD() {
      if (!isMobile()) return;
      document.getElementById('mobileHUD').style.display = 'block';

      const zone  = document.getElementById('joystickZone');
      const knob  = document.getElementById('joystickKnob');
      const fireB = document.getElementById('fireBtn');
      const pauseB = document.getElementById('pauseBtn');
      const KNOB_LIMIT = 38; // max px the knob travels from centre

      function getZoneCenter() {
        const r = zone.getBoundingClientRect();
        return { cx: r.left + r.width / 2, cy: r.top + r.height / 2 };
      }

      function updateKnob(tx, ty) {
        const { cx, cy } = getZoneCenter();
        let dx = tx - cx, dy = ty - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > KNOB_LIMIT) { dx = dx / dist * KNOB_LIMIT; dy = dy / dist * KNOB_LIMIT; }
        joy.dx = dx / KNOB_LIMIT;
        joy.dy = dy / KNOB_LIMIT;
        knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      }

      function resetKnob() {
        joy.dx = 0; joy.dy = 0; joy.active = false; joy.id = null;
        knob.style.transform = 'translate(-50%, -50%)';
      }

      zone.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (joy.active) return;
        const t = e.changedTouches[0];
        joy.active = true; joy.id = t.identifier;
        updateKnob(t.clientX, t.clientY);
        if (!bgmPlaying && !gameOver) startBGM();
      }, { passive: false });

      zone.addEventListener('touchmove', (e) => {
        e.preventDefault();
        for (const t of e.changedTouches) {
          if (t.identifier === joy.id) updateKnob(t.clientX, t.clientY);
        }
      }, { passive: false });

      zone.addEventListener('touchend',    (e) => { e.preventDefault(); resetKnob(); }, { passive: false });
      zone.addEventListener('touchcancel', (e) => { e.preventDefault(); resetKnob(); }, { passive: false });

      // Fire button — held = continuous fire
      fireB.addEventListener('touchstart', (e) => {
        e.preventDefault();
        touchFiring = true;
        fireB.classList.add('pressed');
        if (!bgmPlaying && !gameOver) startBGM();
      }, { passive: false });
      fireB.addEventListener('touchend',    (e) => { e.preventDefault(); touchFiring = false; fireB.classList.remove('pressed'); }, { passive: false });
      fireB.addEventListener('touchcancel', (e) => { e.preventDefault(); touchFiring = false; fireB.classList.remove('pressed'); }, { passive: false });

      // Pause button
      pauseB.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (gameOver) { resetGame(); startBGM(); return; }
        paused = !paused;
        pauseB.textContent = paused ? '▶' : '⏸';
        if (paused) stopBGM(); else startBGM();
      }, { passive: false });

      // Tap anywhere on canvas = restart on game over (mobile convenience)
      canvas.addEventListener('touchstart', (e) => {
        if (gameOver) { e.preventDefault(); resetGame(); startBGM(); }
      }, { passive: false });
    }

    // Inject touch movement into the existing keys-based update loop
    function applyTouchMovement() {
      if (!isMobile()) return;
      const DEAD = 0.15;
      const spd  = ship.speed;
      if (joy.dx >  DEAD) keys['ArrowRight'] = true;  else delete keys['ArrowRight'];
      if (joy.dx < -DEAD) keys['ArrowLeft']  = true;  else delete keys['ArrowLeft'];
      if (joy.dy >  DEAD) keys['ArrowDown']  = true;  else delete keys['ArrowDown'];
      if (joy.dy < -DEAD) keys['ArrowUp']    = true;  else delete keys['ArrowUp'];
      // Diagonal — apply proportional speed directly for smooth feel
      if (Math.abs(joy.dx) > DEAD || Math.abs(joy.dy) > DEAD) {
        ship.x += joy.dx * spd;
        ship.y += joy.dy * spd;
      }
      if (touchFiring) shoot();
    }

    initMobileHUD();

    // ─── Bullets ──────────────────────────────────────────────────────────────
    const bullets        = [];
    const SHOOT_COOLDOWN  = 250; // ms base cooldown
    let   lastShotTime   = 0;

    // ─── Power-up state ───────────────────────────────────────────────────────
    const powerups            = [];
    const POWERUP_SPAWN_INTERVAL = 20000; // ms
    const POWERUP_RADIUS      = 22;
    const POWERUP_SPEED       = 1.5;
    const RAPID_FIRE_DURATION = 5000;     // ms
    let   lastPowerupSpawn    = 0;
    let   rapidFireUntil      = 0;        // timestamp when rapid fire ends

    function spawnPowerup() {
      const now = Date.now();
      if (now - lastPowerupSpawn < POWERUP_SPAWN_INTERVAL) return;
      lastPowerupSpawn = now;
      powerups.push({
        x:      Math.random() * (canvas.width - POWERUP_RADIUS * 4) + POWERUP_RADIUS * 2,
        y:      -POWERUP_RADIUS,
        radius: POWERUP_RADIUS,
        speed:  POWERUP_SPEED,
        angle:  0   // for rotating inner symbol
      });
    }

    function updatePowerups() {
      const now = Date.now();
      for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        p.y     += p.speed;
        p.angle += 0.05;

        // Ship catches power-up (circle overlap)
        const dx = p.x - ship.x;
        const dy = p.y - ship.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < p.radius + ship.width / 2) {
          rapidFireUntil = now + RAPID_FIRE_DURATION;
          playPowerupSound();
          powerups.splice(i, 1);
          continue;
        }

        // Off-screen — remove silently
        if (p.y - p.radius > canvas.height) powerups.splice(i, 1);
      }
    }

    function drawPowerups() {
      const now = Date.now();
      for (const p of powerups) {
        ctx.save();
        ctx.translate(p.x, p.y);
        const pulse = 0.5 + 0.5 * Math.sin(now / 180);
        const r = p.radius;

        // Outer energy ring
        ctx.shadowColor = '#00ffaa';
        ctx.shadowBlur  = 16 + pulse * 14;
        ctx.beginPath();
        ctx.arc(0, 0, r + 3 + pulse * 3, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(0,255,160,${0.35 + pulse * 0.3})`;
        ctx.lineWidth   = 2;
        ctx.stroke();

        // Main gem body — hexagonal
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = (Math.PI / 3) * i - Math.PI / 6;
          i === 0
            ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r)
            : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
        const gemG = ctx.createRadialGradient(-r * 0.3, -r * 0.3, 0, 0, 0, r);
        gemG.addColorStop(0,   `rgba(150,255,200,${0.95})`);
        gemG.addColorStop(0.4, `rgba(0,${Math.floor(180 + pulse * 70)},80,0.9)`);
        gemG.addColorStop(1,   `rgba(0,60,30,0.85)`);
        ctx.fillStyle   = gemG;
        ctx.strokeStyle = '#aaffcc';
        ctx.lineWidth   = 1.5;
        ctx.fill();
        ctx.stroke();

        // Inner facet lines
        ctx.shadowBlur  = 0;
        ctx.strokeStyle = `rgba(200,255,220,0.4)`;
        ctx.lineWidth   = 0.8;
        ctx.beginPath(); ctx.moveTo(0, -r * 0.8); ctx.lineTo(0, r * 0.8); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-r * 0.7, -r * 0.4); ctx.lineTo(r * 0.7, r * 0.4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-r * 0.7,  r * 0.4); ctx.lineTo(r * 0.7, -r * 0.4); ctx.stroke();

        // Rotating ⚡ icon
        ctx.rotate(p.angle);
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur  = 6;
        ctx.fillStyle   = '#ffffff';
        ctx.font        = `bold ${r * 0.95}px Arial`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('⚡', 0, 1);

        ctx.restore();
      }
    }

    function drawRapidFireIndicator() {
      const now       = Date.now();
      const remaining = rapidFireUntil - now;
      if (remaining <= 0) return;

      ctx.save();
      const barW   = 120;
      const barH   = 10;
      const barX   = canvas.width / 2 - barW / 2;
      const barY   = canvas.height - 22;
      const fillW  = barW * (remaining / RAPID_FIRE_DURATION);
      const pulse  = 0.6 + 0.4 * Math.sin(now / 120);

      // Background
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);

      // Fill
      ctx.fillStyle = `rgba(0, 255, 120, ${pulse})`;
      ctx.fillRect(barX, barY, fillW, barH);

      // Border
      ctx.strokeStyle = '#aaffcc';
      ctx.lineWidth   = 1;
      ctx.strokeRect(barX, barY, barW, barH);

      // Label
      ctx.font         = 'bold 12px Arial';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = '#ffffff';
      ctx.fillText('⚡ RAPID FIRE', canvas.width / 2, barY - 10);
      ctx.restore();
    }

    function shoot() {
      const now     = Date.now();
      const isRapid = now < rapidFireUntil;
      const cooldown = isRapid ? Math.floor(SHOOT_COOLDOWN / 3) : SHOOT_COOLDOWN;
      if (now - lastShotTime < cooldown) return;
      lastShotTime = now;
      playShootSound();
      bullets.push({
        x:      ship.x,
        y:      ship.y - ship.height / 2,
        width:  4,
        height: 12,
        speed:  8
      });
    }

    // ─── Difficulty scaling ───────────────────────────────────────────────────
    const DIFFICULTY_INTERVAL  = 15000; // ms — speed ramp every 15 seconds
    const WAVE_SIZE_INTERVAL   = 30000; // ms — +1 enemy per spawn every 30 seconds
    const MAX_SPEED_MULT       = 3.5;
    const MAX_ENEMIES_PER_WAVE = 6;     // cap so screen doesn't get absurd
    let   difficultyLevel      = 0;
    let   speedMultiplier      = 1.0;
    let   spawnInterval        = 1000;
    let   enemiesPerWave       = 1;     // grows by 1 every 30 seconds
    let   gameStartTime        = Date.now();

    function updateDifficulty() {
      const elapsed = Date.now() - gameStartTime;

      // Speed ramp every 15 s
      const level = Math.floor(elapsed / DIFFICULTY_INTERVAL);
      if (level > difficultyLevel) {
        difficultyLevel = level;
        speedMultiplier = Math.min(1.0 + level * 0.3, MAX_SPEED_MULT);
        spawnInterval   = Math.max(300, 1000 - level * 80);
      }

      // Wave size ramp every 30 s
      const waveLevel = Math.floor(elapsed / WAVE_SIZE_INTERVAL);
      enemiesPerWave  = Math.min(1 + waveLevel, MAX_ENEMIES_PER_WAVE);
    }

    // ─── Enemies ──────────────────────────────────────────────────────────────
    const enemies             = [];
    const ENEMY_SIZE          = 52;
    const ENEMY_BASE_SPEED    = 1.8;
    const ENEMY_SPAWN_INTERVAL = 1000; // ms
    let   lastEnemySpawn      = 0;

    const ENEMY_SHAPES = ['triangle', 'diamond', 'hexagon', 'cross', 'circle'];

    function spawnEnemy() {
      const now = Date.now();
      if (now - lastEnemySpawn < spawnInterval) return;
      lastEnemySpawn = now;

      for (let w = 0; w < enemiesPerWave; w++) {
        const shape = ENEMY_SHAPES[Math.floor(Math.random() * ENEMY_SHAPES.length)];
        // Stagger X positions so enemies in the same wave don't all overlap
        const margin = ENEMY_SIZE * 2;
        enemies.push({
          x:       margin + Math.random() * (canvas.width - margin * 2),
          y:       -ENEMY_SIZE - w * (ENEMY_SIZE * 1.5),
          size:    ENEMY_SIZE,
          speed:   (ENEMY_BASE_SPEED + Math.random() * 0.8) * speedMultiplier,
          shape,
          angle:   0,
          spin:    (Math.random() - 0.5) * 0.04,
          imgType: Math.floor(Math.random() * 5)  // 0-4 → one of the 5 enemy ship designs
        });
      }
    }

    // ─── Fast Meteors ─────────────────────────────────────────────────────────
    const meteors              = [];
    const lifeDrops            = []; // extra-life orbs that fall after a meteor is destroyed
    const METEOR_SPAWN_MIN     = 4000;  // earliest a new fast meteor can appear (ms)
    const METEOR_SPAWN_MAX     = 9000;  // latest
    const METEOR_BASE_SPEED    = 5.0;   // much faster than normal enemies (1.8)
    const METEOR_SIZE          = 46;
    const LIFE_DROP_CHANCE     = 0.20;  // 20% chance a destroyed meteor drops +1 life
    let   nextMeteorTime       = Date.now() + METEOR_SPAWN_MIN;

    function spawnMeteor() {
      const now = Date.now();
      if (now < nextMeteorTime) return;
      // Schedule the next one
      nextMeteorTime = now + METEOR_SPAWN_MIN + Math.random() * (METEOR_SPAWN_MAX - METEOR_SPAWN_MIN);
      meteors.push({
        x:     METEOR_SIZE + Math.random() * (canvas.width - METEOR_SIZE * 2),
        y:     -METEOR_SIZE,
        size:  METEOR_SIZE + Math.random() * 10,   // slight size variance
        speed: (METEOR_BASE_SPEED + Math.random() * 2) * speedMultiplier,
        angle: 0,
        spin:  (Math.random() - 0.5) * 0.08
      });
    }

    function updateMeteors() {
      for (let i = meteors.length - 1; i >= 0; i--) {
        const m = meteors[i];
        m.y     += m.speed;
        m.angle += m.spin;
        // hits the ship
        if (ship.invincible === 0) {
          const dx = m.x - ship.x, dy = m.y - ship.y;
          if (Math.sqrt(dx*dx + dy*dy) < m.size / 2 + ship.width / 2) {
            spawnParticles(m.x, m.y);
            meteors.splice(i, 1);
            loseLife();
            continue;
          }
        }
        // off screen — just remove, no life lost
        if (m.y - m.size > canvas.height) meteors.splice(i, 1);
      }
      // update falling life drops
      for (let i = lifeDrops.length - 1; i >= 0; i--) {
        const d = lifeDrops[i];
        d.y     += d.speed;
        d.angle += 0.04;
        // ship catches it
        const dx = d.x - ship.x, dy = d.y - ship.y;
        if (Math.sqrt(dx*dx + dy*dy) < d.radius + ship.width / 2) {
          if (lives < 9) {
            lives++;
            scorePopups.push({ x: d.x, y: d.y - 10, points: '+1 ♥', life: 1.0 });
            playPowerupSound();
          }
          lifeDrops.splice(i, 1);
          continue;
        }
        if (d.y - d.radius > canvas.height) lifeDrops.splice(i, 1);
      }
    }

    function drawMeteors() {
      for (const m of meteors) {
        ctx.save();
        ctx.translate(m.x, m.y);
        ctx.rotate(m.angle);
        const r = m.size / 2;
        // rocky irregular shape using a jagged polygon
        ctx.beginPath();
        const points = 9;
        for (let i = 0; i < points; i++) {
          const a   = (Math.PI * 2 / points) * i;
          const jag = r * (0.75 + 0.25 * Math.sin(i * 7.3)); // pseudo-random bumps
          i === 0
            ? ctx.moveTo(Math.cos(a) * jag, Math.sin(a) * jag)
            : ctx.lineTo(Math.cos(a) * jag, Math.sin(a) * jag);
        }
        ctx.closePath();
        // dark grey-brown rock colour with orange glow (heated by atmosphere)
        const mg = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
        mg.addColorStop(0,   '#cc7733');
        mg.addColorStop(0.4, '#885522');
        mg.addColorStop(1,   '#332211');
        ctx.fillStyle   = mg;
        ctx.shadowColor = '#ff6600';
        ctx.shadowBlur  = 14;
        ctx.fill();
        ctx.strokeStyle = '#ffaa44';
        ctx.lineWidth   = 1.5;
        ctx.stroke();
        // speed streak behind it
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.moveTo(0, -r * 0.3);
        ctx.lineTo(0, -r * 0.3 - m.speed * 4);
        const streak = ctx.createLinearGradient(0, -r * 0.3, 0, -r * 0.3 - m.speed * 4);
        streak.addColorStop(0, 'rgba(255,140,0,0.6)');
        streak.addColorStop(1, 'rgba(255,80,0,0)');
        ctx.strokeStyle = streak;
        ctx.lineWidth   = r * 0.6;
        ctx.stroke();
        ctx.restore();
      }
      // life drop orbs — detailed heart crystal
      for (const d of lifeDrops) {
        ctx.save();
        ctx.translate(d.x, d.y);
        const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 280 + d.phase);
        const r = d.radius;

        // Outer pulsing ring
        ctx.shadowColor = '#ff2266';
        ctx.shadowBlur  = 14 + pulse * 12;
        ctx.beginPath();
        ctx.arc(0, 0, r + 2 + pulse * 3, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,80,140,${0.3 + pulse * 0.3})`;
        ctx.lineWidth   = 1.5;
        ctx.stroke();

        // Main orb body
        const orbG = ctx.createRadialGradient(-r * 0.3, -r * 0.35, 0, 0, 0, r);
        orbG.addColorStop(0,   `rgba(255,200,220,0.98)`);
        orbG.addColorStop(0.35, `rgba(255,${Math.floor(60 + pulse * 60)},120,0.94)`);
        orbG.addColorStop(0.8,  `rgba(180,0,60,0.88)`);
        orbG.addColorStop(1,    `rgba(80,0,30,0.8)`);
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fillStyle   = orbG;
        ctx.strokeStyle = '#ffaacc';
        ctx.lineWidth   = 1.5;
        ctx.fill();
        ctx.stroke();

        // Specular highlight
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.ellipse(-r * 0.28, -r * 0.32, r * 0.22, r * 0.14, -0.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${0.5 + pulse * 0.25})`;
        ctx.fill();

        // Heart symbol
        ctx.shadowColor = '#ff0044';
        ctx.shadowBlur  = 5;
        ctx.fillStyle   = '#ffffff';
        ctx.font        = `bold ${r + 2}px Arial`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('♥', 0, 1);

        ctx.restore();
      }
    }

    // ─── Small Enemies ────────────────────────────────────────────────────────
    // Faster than normal enemies, 3 HP, worth 30 pts
    const smallEnemies           = [];
    const SMALL_ENEMY_SIZE       = 38;           // smaller than normal (30)

    let   lastSmallSpawn         = 0;

    function spawnSmallEnemy() {
      const now = Date.now();
      if (now - lastSmallSpawn < SMALL_SPAWN_INTERVAL) return;
      lastSmallSpawn = now;
      // Spawn 1–2 per trigger for variety
      const count = Math.random() < 0.35 ? 2 : 1;
      for (let i = 0; i < count; i++) {
        const margin = SMALL_ENEMY_SIZE * 2;
        smallEnemies.push({
          x:       margin + Math.random() * (canvas.width - margin * 2),

          flash:   0,
          imgType: Math.floor(Math.random() * 5)  // 0-4 → one of the 5 enemy ship designs
        });
      }
    }
