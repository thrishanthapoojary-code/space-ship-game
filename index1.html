      ctx.moveTo(0, -s*0.85); ctx.lineTo(-s*0.12, -s*0.3);
      ctx.lineTo(-s*0.1, s*0.5); ctx.lineTo(s*0.1, s*0.5);
      ctx.lineTo(s*0.12, -s*0.3); ctx.closePath();
      const cbg = ctx.createLinearGradient(0, -s*0.85, 0, s*0.5);
      cbg.addColorStop(0, f ? '#fff' : '#8899aa');
      cbg.addColorStop(0.3, f ? '#eee' : '#334466');
      cbg.addColorStop(1, f ? '#ddd' : '#112244');
      ctx.fillStyle = cbg; ctx.fill();
      ctx.strokeStyle = f ? '#fff' : '#5588cc'; ctx.lineWidth = 1.2; ctx.stroke();
      // Blue gem nodes
      const gems = [[-s*0.18, -s*0.1],[0, -s*0.4],[s*0.18, -s*0.1],[0, s*0.15]];
      for (const [gx, gy] of gems) {
        ctx.beginPath();
        ctx.arc(gx, gy, s*0.06, 0, Math.PI*2);
        ctx.fillStyle = f ? '#fff' : '#22aaff'; ctx.fill();
        ctx.strokeStyle = f ? '#fff' : '#88ddff'; ctx.lineWidth = 0.8; ctx.stroke();
      }
      // Engine fire glow (bottom)
      if (!f) {
        const fg = ctx.createRadialGradient(0, s*0.6, 0, 0, s*0.6, s*0.22);
        fg.addColorStop(0, 'rgba(255,220,50,0.95)');
        fg.addColorStop(0.4, 'rgba(255,80,0,0.7)');
        fg.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.beginPath(); ctx.arc(0, s*0.6, s*0.22, 0, Math.PI*2);
        ctx.fillStyle = fg; ctx.fill();
      }
    }

    // Type 4: Dark pixel drone (image 5 — grey/black squat body, red engine pods)
    function drawEnemyShip4(ctx, s, flash) {
      const f = flash > 0;
      // Left engine pod
      ctx.beginPath();
      ctx.moveTo(-s*0.22, -s*0.1); ctx.lineTo(-s*0.45, s*0.05);
      ctx.lineTo(-s*0.42, s*0.38); ctx.lineTo(-s*0.18, s*0.3);
      ctx.closePath();
      ctx.fillStyle = f ? '#fff' : '#333333'; ctx.fill();
      ctx.strokeStyle = f ? '#fff' : '#555555'; ctx.lineWidth = 1; ctx.stroke();
      // Right engine pod
      ctx.beginPath();
      ctx.moveTo(s*0.22, -s*0.1); ctx.lineTo(s*0.45, s*0.05);
      ctx.lineTo(s*0.42, s*0.38); ctx.lineTo(s*0.18, s*0.3);
      ctx.closePath();
      ctx.fillStyle = f ? '#fff' : '#333333'; ctx.fill();
      ctx.strokeStyle = f ? '#fff' : '#555555'; ctx.lineWidth = 1; ctx.stroke();
      // Left red thruster flame
      if (!f) {
        ctx.beginPath(); ctx.arc(-s*0.3, s*0.22, s*0.08, 0, Math.PI*2);
        ctx.fillStyle = '#ff4400'; ctx.fill();
        ctx.beginPath(); ctx.arc(-s*0.3, s*0.22, s*0.04, 0, Math.PI*2);
        ctx.fillStyle = '#ffcc00'; ctx.fill();
      }
      // Right red thruster flame
      if (!f) {
        ctx.beginPath(); ctx.arc(s*0.3, s*0.22, s*0.08, 0, Math.PI*2);
        ctx.fillStyle = '#ff4400'; ctx.fill();
        ctx.beginPath(); ctx.arc(s*0.3, s*0.22, s*0.04, 0, Math.PI*2);
        ctx.fillStyle = '#ffcc00'; ctx.fill();
      }
      // Main body (elongated oval)
      ctx.beginPath();
      ctx.ellipse(0, -s*0.1, s*0.18, s*0.55, 0, 0, Math.PI*2);
      const dbg = ctx.createRadialGradient(-s*0.05, -s*0.2, 0, 0, -s*0.1, s*0.55);
      dbg.addColorStop(0, f ? '#fff' : '#555555');
      dbg.addColorStop(0.5, f ? '#eee' : '#2a2a2a');
      dbg.addColorStop(1, f ? '#ddd' : '#111111');
      ctx.fillStyle = dbg; ctx.fill();
      ctx.strokeStyle = f ? '#fff' : '#444444'; ctx.lineWidth = 1.2; ctx.stroke();
      // Cockpit window (dark oval)
      ctx.beginPath();
      ctx.ellipse(0, -s*0.3, s*0.07, s*0.12, 0, 0, Math.PI*2);
      ctx.fillStyle = f ? '#fff' : '#111111'; ctx.fill();
      // Blue bottom thruster
      ctx.beginPath(); ctx.arc(0, s*0.42, s*0.05, 0, Math.PI*2);
      ctx.fillStyle = f ? '#88eeff' : '#00ccff'; ctx.fill();
    }

    // ── Shared enemy ship renderer — picks design by imgType ─────────────────
    function drawEnemyShipByType(e, flash) {
      const s = e.size * 0.5;
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.rotate(e.angle);
      // Red glow on hit
      if (flash > 0) {
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur  = 18;
      } else {
        ctx.shadowColor = '#ff3300';
        ctx.shadowBlur  = 6;
      }
      switch (e.imgType) {
        case 0: drawEnemyShip0(ctx, s, flash); break;
        case 1: drawEnemyShip1(ctx, s, flash); break;
        case 2: drawEnemyShip2(ctx, s, flash); break;
        case 3: drawEnemyShip3(ctx, s, flash); break;
        case 4: drawEnemyShip4(ctx, s, flash); break;
        default: drawEnemyShip0(ctx, s, flash);
      }
      ctx.restore();
    }

    function drawSmallEnemies() {
      for (const e of smallEnemies) {
        drawEnemyShipByType(e, e.flash);

        // HP pips — drawn in screen space below the enemy
        ctx.save();
        const r    = e.size / 2;
        const pipW = 6, pipH = 3, pipGap = 2;
        const totalW = e.hp * (pipW + pipGap) - pipGap;
        const startX = e.x - totalW / 2;
        ctx.shadowBlur = 0;
        for (let p = 0; p < e.hp; p++) {
          ctx.fillStyle = '#ffcc00';
          ctx.fillRect(startX + p * (pipW + pipGap), e.y + r + 4, pipW, pipH);
        }
        ctx.restore();
      }
    }

    // ─── Boss ─────────────────────────────────────────────────────────────────
    const BOSS_SIZE          = 80;
    const BOSS_HP            = 5;
    const BOSS_SPEED         = 1.0;
    const BOSS_SPAWN_INTERVAL = 30000; // 30 seconds
    let   boss               = null;
    let   lastBossSpawn      = -BOSS_SPAWN_INTERVAL; // spawn first boss at 30s
    let   bossHitFlash       = 0; // frames to flash white on hit

    function spawnBoss() {
      const now = Date.now();
      if (now - lastBossSpawn < BOSS_SPAWN_INTERVAL) return;
      if (boss) return; // only one boss at a time
      lastBossSpawn = now;
      boss = {
        x:          canvas.width / 2,
        y:          -BOSS_SIZE,
        size:       BOSS_SIZE,
        speed:      BOSS_SPEED * speedMultiplier,
        hp:         BOSS_HP,
        angle:      0,
        spin:       0.012,
        driftDir:   1,
        driftSpeed: 1.2 * speedMultiplier
      };
    }

    function spawnBossParticles(x, y) {
      // More dramatic purple/pink explosion for boss
      const count = 36;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
        const speed = Math.random() * 5 + 2;
        particles.push({
          x, y,
          vx:     Math.cos(angle) * speed,
          vy:     Math.sin(angle) * speed,
          life:   1.0,
          decay:  Math.random() * 0.025 + 0.015,
          radius: Math.random() * 5 + 2,
          hue:    Math.floor(Math.random() * 60) + 270  // purple → magenta
        });
      }
    }
    const particles = [];

    function spawnParticles(x, y) {
      const count = 18;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + Math.random() * 0.4;
        const speed = Math.random() * 3 + 1.5;
        particles.push({
          x, y,
          vx:     Math.cos(angle) * speed,
          vy:     Math.sin(angle) * speed,
          life:   1.0,
          decay:  Math.random() * 0.04 + 0.03,
          radius: Math.random() * 3 + 1,
          hue:    Math.floor(Math.random() * 50)   // warm: yellow → red
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += 0.05; // gravity
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue},100%,60%,${p.life})`;
        ctx.fill();
      }
    }

    // ─── Energy waves (boss death shockwave) ──────────────────────────────────
    const energyWaves = [];

    function spawnEnergyWave(x, y) {
      energyWaves.push({
        x, y,
        radius:    0,
        maxRadius: 280,   // how far it expands before disappearing
        speed:     6,     // px per frame
        life:      1.0,   // opacity
        hit:       false  // has it already hit the ship this wave
      });
    }

    function updateEnergyWaves() {
      for (let i = energyWaves.length - 1; i >= 0; i--) {
        const w = energyWaves[i];
        w.radius += w.speed;
        w.life    = 1 - w.radius / w.maxRadius;

        // Check if the wave ring passes through the ship
        if (!w.hit && ship.invincible === 0) {
          const dx   = ship.x - w.x;
          const dy   = ship.y - w.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          // The ring has thickness — check if ship is inside the band
          if (dist > w.radius - 20 && dist < w.radius + 20) {
            w.hit = true;
            loseLife();
            playEnergyWaveHitSound();
          }
        }

        if (w.radius >= w.maxRadius) energyWaves.splice(i, 1);
      }
    }

    function drawEnergyWaves() {
      for (const w of energyWaves) {
        ctx.save();
        // Outer bright ring
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(200, 80, 255, ${w.life})`;
        ctx.lineWidth   = 8 * w.life;
        ctx.shadowColor = '#cc00ff';
        ctx.shadowBlur  = 20 * w.life;
        ctx.stroke();
        // Inner thinner ring
        ctx.beginPath();
        ctx.arc(w.x, w.y, Math.max(0, w.radius - 12), 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 180, 255, ${w.life * 0.5})`;
        ctx.lineWidth   = 3 * w.life;
        ctx.shadowBlur  = 0;
        ctx.stroke();
        ctx.restore();
      }
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // ─── BGM ──────────────────────────────────────────────────────────────────
    // Procedural synth BGM: bass + melody + kick drum, all looped via the
    // AudioContext scheduler. Starts on first user interaction.

    const BGM_BPM    = 138;
    const BGM_BEAT   = 60 / BGM_BPM;       // seconds per beat
    const BGM_STEP   = BGM_BEAT / 2;       // 8th-note resolution
    let   bgmNextTime = 0;
    let   bgmStep     = 0;
    let   bgmMaster   = null;              // master gain node

    // Note frequencies (Hz)
    const NOTE = {
      C3:130.81, D3:146.83, E3:164.81, F3:174.61, G3:196.00,
      A3:220.00, B3:246.94, C4:261.63, D4:293.66, E4:329.63,
      F4:349.23, G4:392.00, A4:440.00, B4:493.88,
      C5:523.25, D5:587.33, E5:659.25, G5:783.99, A5:880.00
    };

    // 16-step bass pattern (index = step 0-15, value = note or null)
    const BASS_PATTERN = [
      'C3','C3', null,'G3',  'A3','A3', null,'G3',
      'F3','F3', null,'C3',  'G3','G3', null,null
    ];

    // 16-step melody pattern
    const MELODY_PATTERN = [
      'E5', null,'G5','E5',  null,'A5',null,'G5',
      'E5', null,'D5',null,  'C5',null,'E5',null
    ];

    // 16-step kick pattern (true = hit)
    const KICK_PATTERN = [
      true,false,false,false, true,false,false,false,
      true,false,false,false, true,false,true, false
    ];

    // 16-step hihat pattern
    const HIHAT_PATTERN = [
      false,false,true,false, false,false,true,false,
      false,false,true,false, false,false,true,false
    ];

    function bgmNote(freq, startTime, duration, type, gainVal, detune) {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(bgmMaster);
      osc.type = type;
      osc.frequency.value = freq;
      if (detune) osc.detune.value = detune;
      gain.gain.setValueAtTime(gainVal, startTime);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
      osc.start(startTime);
      osc.stop(startTime + duration + 0.02);
    }

    function bgmKick(startTime) {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(bgmMaster);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, startTime);
      osc.frequency.exponentialRampToValueAtTime(40, startTime + 0.08);
      gain.gain.setValueAtTime(0.9, startTime);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.18);
      osc.start(startTime);
      osc.stop(startTime + 0.2);
    }

    function bgmHihat(startTime) {
      const bufSize = audioCtx.sampleRate * 0.05;
      const buf     = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const data    = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const src    = audioCtx.createBufferSource();
      src.buffer   = buf;
      const filter = audioCtx.createBiquadFilter();
      filter.type            = 'highpass';
      filter.frequency.value = 8000;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.18, startTime);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.05);
      src.connect(filter);
      filter.connect(gain);
      gain.connect(bgmMaster);
      src.start(startTime);
      src.stop(startTime + 0.06);
    }

    // Schedule ~0.25s ahead; called every animation frame
    function scheduleBGM() {
      if (!bgmPlaying || !bgmMaster || paused) return;
      const LOOK_AHEAD = 0.25;
      while (bgmNextTime < audioCtx.currentTime + LOOK_AHEAD) {
        const step = bgmStep % 16;
        const t    = bgmNextTime;

        // Bass
        if (BASS_PATTERN[step]) {
          bgmNote(NOTE[BASS_PATTERN[step]], t, BGM_STEP * 0.9,
                  'sawtooth', 0.18, 0);
        }

        // Melody (plays every other bar — steps 0-15 in even bars)
        const bar = Math.floor(bgmStep / 16) % 2;
        if (bar === 0 && MELODY_PATTERN[step]) {
          bgmNote(NOTE[MELODY_PATTERN[step]], t, BGM_STEP * 0.75,
                  'square', 0.07, -8);
          // slight harmony a 5th up
          bgmNote(NOTE[MELODY_PATTERN[step]] * 1.5, t, BGM_STEP * 0.5,
                  'square', 0.03, 12);
        }

        // Drums
        if (KICK_PATTERN[step])  bgmKick(t);
        if (HIHAT_PATTERN[step]) bgmHihat(t);

        bgmNextTime += BGM_STEP;
        bgmStep++;
      }
    }

    function startBGM() {
      if (bgmPlaying) return;
      ensureAudio();
      bgmMaster = audioCtx.createGain();
      bgmMaster.gain.value = 0.38;
      bgmMaster.connect(audioCtx.destination);
      bgmNextTime = audioCtx.currentTime + 0.1;
      bgmStep     = 0;
      bgmPlaying  = true;
    }

    function stopBGM() {
      bgmPlaying = false;
      if (bgmMaster) {
        bgmMaster.gain.setValueAtTime(bgmMaster.gain.value, audioCtx.currentTime);
        bgmMaster.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        bgmMaster = null;
      }
    }

    function playMilestoneBeep() {
      ensureAudio();
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.35);
    }

    // Short laser "pew" when a bullet is fired
    function playShootSound() {
      ensureAudio();
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'square';
      // Pitch sweeps quickly downward — classic laser blip
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(220, audioCtx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.1);
    }

    // Crunchy explosion burst when a bullet hits an enemy
    function playHitSound() {
      ensureAudio();
      // White-noise-style burst using a buffer of random samples
      const bufferSize = audioCtx.sampleRate * 0.12;
      const buffer     = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data       = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

      const source = audioCtx.createBufferSource();
      source.buffer = buffer;

      // Band-pass filter to give it a punchy mid-range crack
      const filter = audioCtx.createBiquadFilter();
      filter.type            = 'bandpass';
      filter.frequency.value = 800;
      filter.Q.value         = 0.8;

      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.55, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

      source.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      source.start(audioCtx.currentTime);
      source.stop(audioCtx.currentTime + 0.12);
    }

    // Bright rising arpeggio for power-up collect
    function playPowerupSound() {
      ensureAudio();
      const freqs = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
      freqs.forEach((freq, i) => {
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = audioCtx.currentTime + i * 0.07;
        gain.gain.setValueAtTime(0.25, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc.start(t);
        osc.stop(t + 0.22);
      });
    }

    // Deep boom when energy wave hits the ship
    function playEnergyWaveHitSound() {
      ensureAudio();
      // Low sine thud
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(120, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.7, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.55);
      // White noise layer for crunch
      const bufSize = audioCtx.sampleRate * 0.3;
      const buf     = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const data    = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const src    = audioCtx.createBufferSource();
      src.buffer   = buf;
      const filt   = audioCtx.createBiquadFilter();
      filt.type            = 'lowpass';
      filt.frequency.value = 600;
      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(0.4, audioCtx.currentTime);
      ng.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      src.connect(filt); filt.connect(ng); ng.connect(audioCtx.destination);
      src.start(audioCtx.currentTime);
      src.stop(audioCtx.currentTime + 0.35);
    }

    // ─── Scoring ──────────────────────────────────────────────────────────────
    let score         = 0;
    let lastMilestone = 0;
    const scorePopups = [];

    function addScore(points, x, y) {
      score += points;
      scorePopups.push({ x, y, points, life: 1.0 });
      const milestone = Math.floor(score / 100);
      if (milestone > lastMilestone) {
        lastMilestone = milestone;
        playMilestoneBeep();
      }
    }

    function updateScorePopups() {
      for (let i = scorePopups.length - 1; i >= 0; i--) {
        scorePopups[i].y    -= 0.8;
        scorePopups[i].life -= 0.025;
        if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
      }
    }

    function drawScorePopups() {
      ctx.save();
      ctx.font      = 'bold 16px Arial';
      ctx.textAlign = 'center';
      for (const p of scorePopups) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle   = typeof p.points === 'string' && p.points.startsWith('+')
                          ? '#ff88aa' : '#ffe600';
        ctx.fillText(
          typeof p.points === 'string' && p.points.startsWith('+')
            ? p.points
            : `+${p.points}`,
          p.x, p.y
        );
      }
      ctx.restore();
    }

    function drawScore() {
      ctx.save();
      ctx.font      = 'bold 20px Arial';
      ctx.textAlign = 'left';
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillText(`SCORE: ${score}`, 16, 36);
      ctx.fillStyle = '#f0f040';
      ctx.fillText(`SCORE: ${score}`, 15, 35);
      // Difficulty level indicator
      const lvlText = `LVL ${difficultyLevel + 1}`;
      ctx.font      = 'bold 14px Arial';
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillText(lvlText, 16, 58);
      ctx.fillStyle = speedMultiplier >= MAX_SPEED_MULT ? '#ff4444' : '#aaffaa';
      ctx.fillText(lvlText, 15, 57);
      ctx.restore();
    }

    // ─── Game state ───────────────────────────────────────────────────────────
    const MAX_LIVES = 3;
    let lives    = MAX_LIVES;
    let gameOver = false;
    let paused   = false;
    let highScore  = 0;
    let lastScore  = 0;

    function resetGame() {
      score         = 0;
      lastMilestone = 0;
      lives         = MAX_LIVES;
      gameOver      = false;
      ship.x        = canvas.width / 2;
      ship.y        = canvas.height - 60;
      ship.invincible     = 0;
      bullets.length      = 0;
      enemies.length      = 0;
      particles.length    = 0;
      scorePopups.length  = 0;
      lastEnemySpawn      = 0;
      lastShotTime        = 0;
      boss                = null;
      lastBossSpawn       = -BOSS_SPAWN_INTERVAL;
      bossHitFlash        = 0;
      difficultyLevel     = 0;
      speedMultiplier     = 1.0;
      spawnInterval       = 1000;
      enemiesPerWave      = 1;
      gameStartTime       = Date.now();
      powerups.length     = 0;
      lastPowerupSpawn    = 0;
      rapidFireUntil      = 0;
      meteors.length      = 0;
      lifeDrops.length    = 0;
      nextMeteorTime      = Date.now() + METEOR_SPAWN_MIN;
      smallEnemies.length = 0;
      lastSmallSpawn      = 0;
      energyWaves.length  = 0;
    }

    // Listen for R to restart, P / Space to pause
    document.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') {
        if (gameOver) { resetGame(); startBGM(); }
      }
      if (e.key === 'p' || e.key === 'P' || e.key === ' ') {
        // Space during gameplay = shoot (handled in keys{}), so only pause with P.
        // But if the user presses Space while game is already paused (not shooting), toggle.
        if (!gameOver) {
          if (e.key === 'p' || e.key === 'P') {
            paused = !paused;
            if (paused) stopBGM(); else startBGM();
          }
        }
      }
    });

    function loseLife() {
      lives--;
      ship.invincible = 120;
      if (lives <= 0) {
        lives     = 0;
        gameOver  = true;
        paused    = false;
        lastScore = score;
        if (score > highScore) highScore = score;
        stopBGM();
      }
    }
    // ─── Update ───────────────────────────────────────────────────────────────
    function update() {
      if (gameOver || paused) return;

      updateDifficulty();
      if (ship.invincible > 0) ship.invincible--;

      // Apply touch joystick + fire button (no-op on desktop)
      applyTouchMovement();

      // Ship movement — all 4 directions
      if (keys['ArrowLeft'])  ship.x -= ship.speed;
      if (keys['ArrowRight']) ship.x += ship.speed;
      if (keys['ArrowUp'])    ship.y -= ship.speed;
      if (keys['ArrowDown'])  ship.y += ship.speed;
      if (keys[' '])          shoot();

      // Clamp ship within screen boundaries
      const hw = ship.width  / 2;
      const hh = ship.height / 2;
      if (ship.x - hw < 0)             ship.x = hw;
      if (ship.x + hw > canvas.width)  ship.x = canvas.width  - hw;
      if (ship.y - hh < 0)             ship.y = hh;
      if (ship.y + hh > canvas.height) ship.y = canvas.height - hh;

      // Bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= bullets[i].speed;
        if (bullets[i].y + bullets[i].height < 0) bullets.splice(i, 1);
      }

      // Normal enemies
      spawnEnemy();
      spawnPowerup();
      spawnMeteor();
      spawnSmallEnemy();
      for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].y     += enemies[i].speed;
        enemies[i].angle += enemies[i].spin;

        // Enemy hits the ship
        if (ship.invincible === 0) {
          const e  = enemies[i];
          const er = e.size / 2;
          const sx = ship.x, sy = ship.y;
          const sh = ship.height / 2, sw = ship.width / 2;
          if (e.x + er > sx - sw && e.x - er < sx + sw &&
              e.y + er > sy - sh && e.y - er < sy + sh) {
            spawnParticles(e.x, e.y);
            enemies.splice(i, 1);
            loseLife();
            continue;
          }
        }

        if (enemies[i] && enemies[i].y - enemies[i].size > canvas.height) {
          enemies.splice(i, 1);
        }
      }

      // Boss
      spawnBoss();
      if (boss) {
        boss.y     += boss.speed;
        boss.angle += boss.spin;
        boss.x     += boss.driftSpeed * boss.driftDir;
        const bossR = boss.size / 2;
        if (boss.x + bossR > canvas.width) boss.driftDir = -1;
        if (boss.x - bossR < 0)            boss.driftDir =  1;
        if (bossHitFlash > 0) bossHitFlash--;

        // Boss hits the ship
        if (ship.invincible === 0) {
          const sx = ship.x, sy = ship.y;
          const sh = ship.height / 2, sw = ship.width / 2;
          if (boss.x + bossR > sx - sw && boss.x - bossR < sx + sw &&
              boss.y + bossR > sy - sh && boss.y - bossR < sy + sh) {
            spawnParticles(sx, sy);
            loseLife();
          }
        }

        if (boss.y - bossR > canvas.height) boss = null;
      }

      if (gameOver) return;

      // Bullet ↔ normal enemy collision
      for (let bi = bullets.length - 1; bi >= 0; bi--) {
        const b = bullets[bi];
        let hit = false;
        for (let ei = enemies.length - 1; ei >= 0; ei--) {
          const e = enemies[ei];
          const r = e.size / 2;
          if (b.x > e.x - r && b.x < e.x + r &&
              b.y < e.y + r && b.y + b.height > e.y - r) {
            spawnParticles(e.x, e.y);
            addScore(10, e.x, e.y - r);
            enemies.splice(ei, 1);
            playHitSound();
            hit = true;
            break;
          }
        }
        if (hit) { bullets.splice(bi, 1); continue; }

        // Bullet ↔ meteor collision
        for (let mi = meteors.length - 1; mi >= 0; mi--) {
          const m = meteors[mi];
          const mr = m.size / 2;
          if (b.x > m.x - mr && b.x < m.x + mr &&
              b.y < m.y + mr && b.y + b.height > m.y - mr) {
            spawnParticles(m.x, m.y);
            addScore(15, m.x, m.y - mr);  // meteors worth 15 pts (slightly more)
            playHitSound();
            // chance to drop an extra life
            if (Math.random() < LIFE_DROP_CHANCE) {
              lifeDrops.push({
                x: m.x, y: m.y, radius: 20,
                speed: 1.8, angle: 0,
                phase: Math.random() * Math.PI * 2
              });
            }
            meteors.splice(mi, 1);
            hit = true;
            break;
          }
        }
        if (hit) { bullets.splice(bi, 1); continue; }

        // Bullet ↔ small enemy collision (3 HP — takes 3 hits)
        for (let si = smallEnemies.length - 1; si >= 0; si--) {
          const se = smallEnemies[si];
          const sr = se.size / 2;
          if (b.x > se.x - sr && b.x < se.x + sr &&
              b.y < se.y + sr && b.y + b.height > se.y - sr) {
            se.hp--;
            se.flash = 6;
            spawnParticles(b.x, b.y);
            playHitSound();
            if (se.hp <= 0) {
              spawnParticles(se.x, se.y);
              addScore(SMALL_ENEMY_POINTS, se.x, se.y - sr);
              smallEnemies.splice(si, 1);
            }
            hit = true;
            break;
          }
        }
        if (hit) { bullets.splice(bi, 1); continue; }

        // Bullet ↔ boss collision
        if (boss) {
          const br = boss.size / 2;
          if (b.x > boss.x - br && b.x < boss.x + br &&
              b.y < boss.y + br && b.y + b.height > boss.y - br) {
            boss.hp--;
            bossHitFlash = 6;
            spawnParticles(b.x, b.y);
            playHitSound();
            bullets.splice(bi, 1);
            if (boss.hp <= 0) {
              spawnBossParticles(boss.x, boss.y);
              spawnEnergyWave(boss.x, boss.y);
              addScore(50, boss.x, boss.y - br);
              // Reward player with an extra life (capped at 5)
              if (lives < 5) {
                lives++;
                scorePopups.push({ x: boss.x, y: boss.y - br - 20, points: '+1 ♥', life: 1.0 });
              }
              boss = null;
            }
          }
        }
      }

      updateParticles();
      updateScorePopups();
      updatePowerups();
      updateMeteors();

      // Small enemy movement + ship collision
      for (let i = smallEnemies.length - 1; i >= 0; i--) {
        const e = smallEnemies[i];
        e.y     += e.speed;
        e.angle += e.spin;
        if (e.flash > 0) e.flash--;
        // hits the ship
        if (ship.invincible === 0) {
          const dx = e.x - ship.x, dy = e.y - ship.y;
          if (Math.sqrt(dx*dx + dy*dy) < e.size / 2 + ship.width / 2) {
            spawnParticles(e.x, e.y);
            smallEnemies.splice(i, 1);
            loseLife();
            continue;
          }
        }
        // off screen — remove silently
        if (e.y - e.size > canvas.height) smallEnemies.splice(i, 1);
      }
      updateEnergyWaves();
      updateStars();
    }

    // ─── Draw ─────────────────────────────────────────────────────────────────
    function drawLives() {
      ctx.save();
      ctx.font      = 'bold 20px Arial';
      ctx.textAlign = 'right';
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillText(`LIVES: ${'\u2665'.repeat(lives)}`, canvas.width - 14, 36);
      // Foreground — red hearts
      ctx.fillStyle = '#ff4444';
      ctx.fillText(`LIVES: ${'\u2665'.repeat(lives)}`, canvas.width - 15, 35);
      ctx.restore();
    }

    function drawGameOver() {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width  / 2;
      const cy = canvas.height / 2;

      // "GAME OVER"
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.font         = 'bold 72px Arial';
      ctx.fillStyle    = 'rgba(0,0,0,0.8)';
      ctx.fillText('GAME OVER', cx + 3, cy - 70 + 3);
      ctx.fillStyle = '#ff2222';
      ctx.fillText('GAME OVER', cx, cy - 70);

      // Last score
      ctx.font      = 'bold 26px Arial';
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillText(`SCORE: ${lastScore}`, cx + 2, cy - 10 + 2);
      ctx.fillStyle = '#f0f040';
      ctx.fillText(`SCORE: ${lastScore}`, cx, cy - 10);

      // High score
      ctx.font      = 'bold 20px Arial';
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillText(`BEST: ${highScore}`, cx + 2, cy + 26 + 2);
      ctx.fillStyle = highScore === lastScore ? '#ff88ff' : '#aaffaa';
      ctx.fillText(
        highScore === lastScore && lastScore > 0
          ? `🏆 BEST: ${highScore}  NEW HIGH SCORE!`
          : `BEST: ${highScore}`,
        cx, cy + 26
      );

      // Restart prompt — pulsing alpha, adapts to device
      const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 400);
      ctx.font        = 'bold 22px Arial';
      ctx.globalAlpha = pulse;
      ctx.fillStyle   = '#ffffff';
      const restartHint = isMobile() ? 'Tap anywhere to Restart' : 'Press  R  to Restart';
      ctx.fillText(restartHint, cx, cy + 75);
      ctx.restore();
    }

    function drawPauseOverlay() {
      if (!paused) return;
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const cx = canvas.width / 2, cy = canvas.height / 2;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.font         = 'bold 64px Arial';
      ctx.fillStyle    = 'rgba(0,0,0,0.7)';
      ctx.fillText('PAUSED', cx + 3, cy - 20 + 3);
      ctx.fillStyle = '#ffffff';
      ctx.fillText('PAUSED', cx, cy - 20);
      const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 400);
      ctx.font        = 'bold 20px Arial';
      ctx.globalAlpha = pulse;
      ctx.fillStyle   = '#aaaaaa';
      const resumeHint = isMobile() ? 'Tap ⏸ to Resume' : 'Press  P  to Resume';
      ctx.fillText(resumeHint, cx, cy + 30);
      ctx.restore();
    }
    function drawBoss() {
      if (!boss) return;
      const f = bossHitFlash > 0;
      const s = boss.size * 0.5;   // half-size as drawing unit
      const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 180);

      ctx.save();
      ctx.translate(boss.x, boss.y);
      ctx.rotate(boss.angle);

      // ── Outer glow aura ────────────────────────────────────────────────────
      if (!f) {
        const aura = ctx.createRadialGradient(0, 0, s * 0.5, 0, 0, s * 2.2);
        aura.addColorStop(0,   `rgba(180,0,255,${0.18 * pulse})`);
        aura.addColorStop(0.5, `rgba(100,0,180,${0.10 * pulse})`);
        aura.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(0, 0, s * 2.2, 0, Math.PI * 2);
        ctx.fillStyle = aura;
        ctx.fill();
      }

      // ── Far outer sweep wings ──────────────────────────────────────────────
      // Left
      ctx.beginPath();
      ctx.moveTo(-s * 0.3,  -s * 0.6);
      ctx.lineTo(-s * 1.7,  -s * 1.1);
      ctx.lineTo(-s * 2.0,   s * 0.1);
      ctx.lineTo(-s * 1.6,   s * 0.8);
      ctx.lineTo(-s * 0.5,   s * 0.5);
      ctx.closePath();
      const lwOuter = ctx.createLinearGradient(-s * 2.0, -s * 1.1, -s * 0.3, s * 0.5);
      lwOuter.addColorStop(0, f ? '#fff' : '#550088');
      lwOuter.addColorStop(0.5, f ? '#eee' : '#330055');
      lwOuter.addColorStop(1, f ? '#ddd' : '#1a0033');
      ctx.fillStyle   = lwOuter;
      ctx.strokeStyle = f ? '#fff' : '#bb44ff';
      ctx.lineWidth   = 1.5;
      ctx.fill(); ctx.stroke();

      // Right
      ctx.beginPath();
      ctx.moveTo( s * 0.3,  -s * 0.6);
      ctx.lineTo( s * 1.7,  -s * 1.1);
      ctx.lineTo( s * 2.0,   s * 0.1);
      ctx.lineTo( s * 1.6,   s * 0.8);
      ctx.lineTo( s * 0.5,   s * 0.5);
      ctx.closePath();
      ctx.fillStyle   = lwOuter;
      ctx.strokeStyle = f ? '#fff' : '#bb44ff';
      ctx.lineWidth   = 1.5;
      ctx.fill(); ctx.stroke();

      // Wing edge highlight streaks
      ctx.shadowColor = f ? '#fff' : '#dd00ff';
      ctx.shadowBlur  = f ? 20 : 10;
      ctx.beginPath();
      ctx.moveTo(-s * 1.7, -s * 1.1); ctx.lineTo(-s * 2.0, s * 0.1);
      ctx.strokeStyle = f ? '#fff' : `rgba(220,100,255,${pulse})`;
      ctx.lineWidth   = 2.5; ctx.stroke();
      ctx.beginPath();
      ctx.moveTo( s * 1.7, -s * 1.1); ctx.lineTo( s * 2.0, s * 0.1);
      ctx.stroke();
      ctx.shadowBlur = 0;

      // ── Mid shoulder armour plates ─────────────────────────────────────────
      // Left shoulder
      ctx.beginPath();
      ctx.moveTo(-s * 0.22, -s * 0.9);
      ctx.lineTo(-s * 0.8,  -s * 0.7);
      ctx.lineTo(-s * 1.0,   s * 0.1);
      ctx.lineTo(-s * 0.7,   s * 0.6);
      ctx.lineTo(-s * 0.22,  s * 0.4);
      ctx.closePath();
      const lsh = ctx.createLinearGradient(-s, -s * 0.9, -s * 0.2, s * 0.6);
      lsh.addColorStop(0, f ? '#fff' : '#6600aa');
      lsh.addColorStop(1, f ? '#ccc' : '#220044');
      ctx.fillStyle   = lsh;
      ctx.strokeStyle = f ? '#fff' : '#cc55ff';
      ctx.lineWidth   = 1.2;
      ctx.fill(); ctx.stroke();

      // Right shoulder
      ctx.beginPath();
      ctx.moveTo( s * 0.22, -s * 0.9);
      ctx.lineTo( s * 0.8,  -s * 0.7);
      ctx.lineTo( s * 1.0,   s * 0.1);
      ctx.lineTo( s * 0.7,   s * 0.6);
      ctx.lineTo( s * 0.22,  s * 0.4);
      ctx.closePath();
      ctx.fillStyle   = lsh;
      ctx.strokeStyle = f ? '#fff' : '#cc55ff';
      ctx.lineWidth   = 1.2;
      ctx.fill(); ctx.stroke();

      // ── Wing cannon pods (outer) ───────────────────────────────────────────
      // Left
      ctx.beginPath();
      ctx.roundRect(-s * 1.55, -s * 0.2, s * 0.32, s * 0.55, s * 0.06);
      ctx.fillStyle   = f ? '#fff' : '#1a0033';
      ctx.strokeStyle = f ? '#fff' : '#9933cc';
      ctx.lineWidth   = 1; ctx.fill(); ctx.stroke();
      // barrel
      ctx.fillStyle = f ? '#fff' : '#7700aa';
      ctx.fillRect(-s * 1.46, -s * 0.38, s * 0.14, s * 0.18);
      // Right
      ctx.beginPath();
      ctx.roundRect( s * 1.23, -s * 0.2, s * 0.32, s * 0.55, s * 0.06);
      ctx.fillStyle   = f ? '#fff' : '#1a0033';
      ctx.strokeStyle = f ? '#fff' : '#9933cc';
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = f ? '#fff' : '#7700aa';
      ctx.fillRect( s * 1.32, -s * 0.38, s * 0.14, s * 0.18);

      // ── Central fortress hull ──────────────────────────────────────────────
      ctx.beginPath();
      ctx.moveTo( 0,       -s * 1.5);   // nose spike tip
      ctx.lineTo(-s * 0.12, -s * 1.0);
      ctx.lineTo(-s * 0.28, -s * 0.6);
      ctx.lineTo(-s * 0.32,  s * 0.7);
      ctx.lineTo( s * 0.32,  s * 0.7);
      ctx.lineTo( s * 0.28, -s * 0.6);
      ctx.lineTo( s * 0.12, -s * 1.0);
      ctx.closePath();
      const hullG = ctx.createLinearGradient(0, -s * 1.5, 0, s * 0.7);
      hullG.addColorStop(0,   f ? '#fff' : '#cc66ff');
      hullG.addColorStop(0.2, f ? '#eee' : '#550099');
      hullG.addColorStop(0.6, f ? '#ddd' : '#330066');
      hullG.addColorStop(1,   f ? '#ccc' : '#110022');
      ctx.shadowColor = f ? '#fff' : '#cc00ff';
      ctx.shadowBlur  = f ? 25 : 15;
      ctx.fillStyle   = hullG;
      ctx.strokeStyle = f ? '#fff' : '#ee88ff';
      ctx.lineWidth   = 1.8;
      ctx.fill(); ctx.stroke();
      ctx.shadowBlur  = 0;

      // Hull centre groove
      ctx.beginPath();
      ctx.moveTo(0, -s * 1.1); ctx.lineTo(0, s * 0.65);
      ctx.strokeStyle = f ? '#aaa' : '#aa00dd';
      ctx.lineWidth   = s * 0.08; ctx.stroke();

      // Hull armour ribs (horizontal lines)
      for (let i = 0; i < 4; i++) {
        const ry = -s * 0.5 + i * s * 0.35;
        const rw = s * (0.25 - i * 0.01);
        ctx.beginPath();
        ctx.moveTo(-rw, ry); ctx.lineTo(rw, ry);
        ctx.strokeStyle = f ? '#ccc' : `rgba(180,80,255,0.5)`;
        ctx.lineWidth   = 1.5; ctx.stroke();
      }

      // ── Nose spike ────────────────────────────────────────────────────────
      ctx.beginPath();
      ctx.moveTo(0, -s * 1.5);
      ctx.lineTo(-s * 0.07, -s * 1.1);
      ctx.lineTo( s * 0.07, -s * 1.1);
      ctx.closePath();
      ctx.fillStyle   = f ? '#fff' : '#ff88ff';
      ctx.strokeStyle = f ? '#fff' : '#ffffff';
      ctx.lineWidth   = 1;
      ctx.fill(); ctx.stroke();

      // Side forward spikes
      ctx.beginPath();
      ctx.moveTo(-s * 0.28, -s * 0.6);
      ctx.lineTo(-s * 0.55, -s * 1.05);
      ctx.lineTo(-s * 0.38, -s * 0.55);
      ctx.closePath();
      ctx.fillStyle   = f ? '#fff' : '#9922cc';
      ctx.strokeStyle = f ? '#fff' : '#cc66ff';
      ctx.lineWidth   = 1;
      ctx.fill(); ctx.stroke();

      ctx.beginPath();
      ctx.moveTo( s * 0.28, -s * 0.6);
      ctx.lineTo( s * 0.55, -s * 1.05);
      ctx.lineTo( s * 0.38, -s * 0.55);
      ctx.closePath();
      ctx.fill(); ctx.stroke();

      // ── Core reactor eye (pulsing) ─────────────────────────────────────────
      const eyeR = s * 0.18;
      const eyeG = ctx.createRadialGradient(0, -s * 0.1, 0, 0, -s * 0.1, eyeR);
      eyeG.addColorStop(0,   f ? '#ffffff' : `rgba(255,230,255,${pulse})`);
      eyeG.addColorStop(0.4, f ? '#ffccff' : `rgba(220,0,255,${pulse * 0.9})`);
      eyeG.addColorStop(1,   f ? '#cc88ff' : `rgba(80,0,120,0.2)`);
      ctx.shadowColor = f ? '#fff' : '#ff00ff';
      ctx.shadowBlur  = f ? 20 : 12 * pulse;
      ctx.beginPath();
      ctx.arc(0, -s * 0.1, eyeR, 0, Math.PI * 2);
      ctx.fillStyle = eyeG;
      ctx.fill();
      ctx.shadowBlur = 0;

      // Inner pupil
      ctx.beginPath();
      ctx.arc(0, -s * 0.1, eyeR * 0.38, 0, Math.PI * 2);
      ctx.fillStyle = f ? '#fff' : '#220033';
      ctx.fill();

      // ── Engine nozzles (3, bottom) ────────────────────────────────────────
      const nozzles = [[-s * 0.14, s * 0.65], [0, s * 0.72], [s * 0.14, s * 0.65]];
      for (const [nx, ny] of nozzles) {
        ctx.beginPath();
        ctx.roundRect(nx - s * 0.08, ny - s * 0.02, s * 0.16, s * 0.2, s * 0.04);
        ctx.fillStyle   = f ? '#ccc' : '#110022';
        ctx.strokeStyle = f ? '#fff' : '#7700bb';
        ctx.lineWidth   = 1; ctx.fill(); ctx.stroke();
        if (!f) {
          const ng = ctx.createRadialGradient(nx, ny + s * 0.14, 0, nx, ny + s * 0.14, s * 0.14);
          ng.addColorStop(0,   `rgba(255,180,255,${pulse})`);
          ng.addColorStop(0.5, `rgba(180,0,255,0.6)`);
          ng.addColorStop(1,   'rgba(0,0,0,0)');
          ctx.beginPath();
          ctx.arc(nx, ny + s * 0.14, s * 0.14, 0, Math.PI * 2);
          ctx.fillStyle = ng; ctx.fill();
        }
      }

      // ── Secondary side guns (left + right on hull) ────────────────────────
      const sGuns = [[-s * 0.38, s * 0.15], [s * 0.38, s * 0.15]];
      for (const [gx, gy] of sGuns) {
        ctx.beginPath();
        ctx.roundRect(gx - s * 0.08, gy - s * 0.04, s * 0.16, s * 0.28, s * 0.03);
        ctx.fillStyle   = f ? '#fff' : '#330055';
        ctx.strokeStyle = f ? '#fff' : '#aa44ee';
        ctx.lineWidth   = 1; ctx.fill(); ctx.stroke();
        // barrel tip glow
        if (!f) {
          ctx.shadowColor = '#dd00ff';
          ctx.shadowBlur  = 6 * pulse;
          ctx.beginPath();
          ctx.arc(gx, gy - s * 0.04, s * 0.04, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,100,255,${pulse})`; ctx.fill();
          ctx.shadowBlur = 0;
        }
      }

      ctx.restore();

      // ── Health bar + BOSS label (screen space) ────────────────────────────
      const barW  = boss.size * 2.2;
      const barH  = 10;
      const barX  = boss.x - barW / 2;
      const barY  = boss.y + boss.size + 14;
      const fillW = barW * (boss.hp / BOSS_HP);
      const hpPct = boss.hp / BOSS_HP;

      ctx.save();
      // Background track
      ctx.fillStyle = 'rgba(20,0,30,0.85)';
      ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
      // Fill — green → yellow → red based on HP
      const barColor = hpPct > 0.6 ? '#cc00ff' : hpPct > 0.3 ? '#ff8800' : '#ff2222';
      ctx.fillStyle = barColor;
      ctx.fillRect(barX, barY, fillW, barH);
      // Pulsing inner highlight
      ctx.fillStyle = `rgba(255,200,255,${0.25 * pulse})`;
      ctx.fillRect(barX, barY, fillW, barH * 0.45);
      // Border
      ctx.strokeStyle = '#ee88ff';
      ctx.lineWidth   = 1.2;
      ctx.strokeRect(barX, barY, barW, barH);
      // HP segment ticks
      for (let i = 1; i < BOSS_HP; i++) {
        const tx = barX + barW * (i / BOSS_HP);
        ctx.beginPath(); ctx.moveTo(tx, barY); ctx.lineTo(tx, barY + barH);
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth   = 1; ctx.stroke();
      }
      // BOSS label with shadow
      ctx.font      = 'bold 13px Arial';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillText('⚠ BOSS ⚠', boss.x + 1, barY - 4);
      ctx.fillStyle = '#ff88ff';
      ctx.fillText('⚠ BOSS ⚠', boss.x, barY - 5);
      ctx.restore();
    }

    function drawBossWarning() {
      // Pulsing "BOSS INCOMING" banner shown for 3 seconds after boss spawns
      if (!boss) return;
      if (boss.y > 0) return; // only show while boss is still entering
      ctx.save();
      const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 150);
      ctx.globalAlpha  = pulse;
      ctx.font         = 'bold 28px Arial';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = '#ff44ff';
      ctx.fillText('⚠  BOSS INCOMING  ⚠', canvas.width / 2, canvas.height / 2);
      ctx.restore();
    }

    function drawShip() {
      // Flicker every 6 frames while invincible
      if (ship.invincible > 0 && Math.floor(ship.invincible / 6) % 2 === 0) return;
      const { x, y } = ship;

      ctx.save();
      ctx.translate(x, y);

      const S = 1.15; // overall scale factor

      // ── Engine glow (drawn first, behind hull) ───────────────────────────
      const engineGlow = ctx.createRadialGradient(0, 22*S, 0, 0, 22*S, 18*S);
      engineGlow.addColorStop(0,   'rgba(80,180,255,0.85)');
      engineGlow.addColorStop(0.4, 'rgba(40,100,255,0.45)');
      engineGlow.addColorStop(1,   'rgba(0,0,80,0)');
      ctx.beginPath();
      ctx.ellipse(0, 22*S, 12*S, 10*S, 0, 0, Math.PI * 2);
      ctx.fillStyle = engineGlow;
      ctx.fill();

      // ── Left swept wing ──────────────────────────────────────────────────
      ctx.beginPath();
      ctx.moveTo(-6*S,  -18*S);   // inner top (near spine)
      ctx.lineTo(-38*S, -28*S);   // outer tip (top)
      ctx.lineTo(-46*S,  -8*S);   // outer leading edge
      ctx.lineTo(-44*S,  14*S);   // outer mid
      ctx.lineTo(-32*S,  22*S);   // outer bottom
      ctx.lineTo(-10*S,  16*S);   // inner bottom
      ctx.closePath();
      const lgWing = ctx.createLinearGradient(-46*S, -28*S, -6*S, 16*S);
      lgWing.addColorStop(0,   '#4488ee');
      lgWing.addColorStop(0.3, '#2255bb');
      lgWing.addColorStop(0.7, '#112277');
      lgWing.addColorStop(1,   '#0a1040');
      ctx.fillStyle   = lgWing;
      ctx.strokeStyle = '#6699ff';
      ctx.lineWidth   = 1.2;
      ctx.fill();
      ctx.stroke();

      // Wing edge highlight
      ctx.beginPath();
      ctx.moveTo(-38*S, -28*S);
      ctx.lineTo(-46*S,  -8*S);
      ctx.lineTo(-44*S,  14*S);
      ctx.strokeStyle = 'rgba(120,180,255,0.7)';
      ctx.lineWidth   = 2;
      ctx.stroke();

      // ── Right swept wing (mirror) ─────────────────────────────────────────
      ctx.beginPath();
      ctx.moveTo( 6*S,  -18*S);
      ctx.lineTo( 38*S, -28*S);
      ctx.lineTo( 46*S,  -8*S);
      ctx.lineTo( 44*S,  14*S);
      ctx.lineTo( 32*S,  22*S);
      ctx.lineTo( 10*S,  16*S);
      ctx.closePath();
      const rgWing = ctx.createLinearGradient(6*S, -28*S, 46*S, 16*S);
      rgWing.addColorStop(0,   '#4488ee');
      rgWing.addColorStop(0.3, '#2255bb');
      rgWing.addColorStop(0.7, '#112277');
      rgWing.addColorStop(1,   '#0a1040');
      ctx.fillStyle   = rgWing;
      ctx.strokeStyle = '#6699ff';
      ctx.lineWidth   = 1.2;
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo( 38*S, -28*S);
      ctx.lineTo( 46*S,  -8*S);
      ctx.lineTo( 44*S,  14*S);
      ctx.strokeStyle = 'rgba(120,180,255,0.7)';
      ctx.lineWidth   = 2;
      ctx.stroke();

      // ── Left wing cannon pod ──────────────────────────────────────────────
      ctx.beginPath();
      ctx.roundRect(-42*S, -2*S, 12*S, 7*S, 3);
      const lgCannon = ctx.createLinearGradient(-42*S, -2*S, -30*S, 5*S);
      lgCannon.addColorStop(0, '#223388');
      lgCannon.addColorStop(1, '#0a1040');
      ctx.fillStyle   = lgCannon;
      ctx.strokeStyle = '#4466bb';
      ctx.lineWidth   = 1;
      ctx.fill();
      ctx.stroke();

      // ── Right wing cannon pod ─────────────────────────────────────────────
      ctx.beginPath();
      ctx.roundRect(30*S, -2*S, 12*S, 7*S, 3);
      ctx.fillStyle   = lgCannon;
      ctx.fill();
      ctx.stroke();

      // ── Central hull body ─────────────────────────────────────────────────
      ctx.beginPath();
      ctx.moveTo(  0,    -26*S);  // nose tip
      ctx.lineTo( -8*S,  -18*S); // shoulder left
      ctx.lineTo(-12*S,   -4*S); // hull left upper
      ctx.lineTo(-14*S,   14*S); // hull left lower
      ctx.lineTo( -8*S,   24*S); // engine base left
      ctx.lineTo(  8*S,   24*S); // engine base right
      ctx.lineTo( 14*S,   14*S); // hull right lower
      ctx.lineTo( 12*S,   -4*S); // hull right upper
      ctx.lineTo(  8*S,  -18*S); // shoulder right
      ctx.closePath();
      const lgHull = ctx.createLinearGradient(0, -26*S, 0, 24*S);
      lgHull.addColorStop(0,   '#6699ff');
      lgHull.addColorStop(0.2, '#3366cc');
      lgHull.addColorStop(0.6, '#1a3388');
      lgHull.addColorStop(1,   '#0d1a55');
      ctx.fillStyle   = lgHull;
      ctx.strokeStyle = '#88aaff';
      ctx.lineWidth   = 1.5;
      ctx.fill();
      ctx.stroke();

      // Hull centre panel
      ctx.beginPath();
      ctx.moveTo(  0,   -18*S);
      ctx.lineTo( -6*S,  -8*S);
      ctx.lineTo( -6*S,  10*S);
      ctx.lineTo(  6*S,  10*S);
      ctx.lineTo(  6*S,  -8*S);
      ctx.closePath();
      ctx.fillStyle   = '#1a2266';
      ctx.strokeStyle = '#4466aa';
      ctx.lineWidth   = 1;
      ctx.fill();
      ctx.stroke();

      // ── Cockpit canopy ────────────────────────────────────────────────────
      ctx.beginPath();
      ctx.ellipse(0, -10*S, 5*S, 9*S, 0, 0, Math.PI * 2);
      const lgCock = ctx.createRadialGradient(-2*S, -14*S, 1, 0, -10*S, 6*S);
      lgCock.addColorStop(0,   'rgba(160,210,255,0.9)');
      lgCock.addColorStop(0.5, 'rgba(60,120,220,0.7)');
      lgCock.addColorStop(1,   'rgba(10,30,100,0.8)');
      ctx.fillStyle   = lgCock;
      ctx.strokeStyle = '#aaccff';
      ctx.lineWidth   = 1;
      ctx.fill();
      ctx.stroke();

      // ── Nose spike / top turret ───────────────────────────────────────────
      ctx.beginPath();
      ctx.moveTo( 0,    -26*S);
      ctx.lineTo(-2.5*S,-16*S);
      ctx.lineTo( 2.5*S,-16*S);
      ctx.closePath();
      ctx.fillStyle   = '#99bbff';
      ctx.strokeStyle = '#cce0ff';
      ctx.lineWidth   = 1;
      ctx.fill();
      ctx.stroke();

      // Side fin spikes (small forward-swept fins)
      // Left
      ctx.beginPath();
      ctx.moveTo(-8*S,  -18*S);
      ctx.lineTo(-20*S, -30*S);
      ctx.lineTo(-14*S, -16*S);
      ctx.closePath();
      ctx.fillStyle   = '#4477cc';
      ctx.strokeStyle = '#88aaee';
      ctx.lineWidth   = 1;
      ctx.fill();
      ctx.stroke();
      // Right
      ctx.beginPath();
      ctx.moveTo( 8*S,  -18*S);
      ctx.lineTo( 20*S, -30*S);
      ctx.lineTo( 14*S, -16*S);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // ── Engine nozzles (3 at the bottom) ─────────────────────────────────
      const nozzlePositions = [[-8*S, 22*S], [0, 23*S], [8*S, 22*S]];
      for (const [nx, ny] of nozzlePositions) {
        // Outer casing
        ctx.beginPath();
        ctx.roundRect(nx - 4*S, ny - 2*S, 8*S, 8*S, 2);
        ctx.fillStyle   = '#1a1a2e';
        ctx.strokeStyle = '#445588';
        ctx.lineWidth   = 1;
        ctx.fill();
        ctx.stroke();
        // Inner glow
        const nGlow = ctx.createRadialGradient(nx, ny+3*S, 0, nx, ny+3*S, 4*S);
        nGlow.addColorStop(0,   'rgba(120,200,255,0.95)');
        nGlow.addColorStop(0.5, 'rgba(60,100,255,0.6)');
        nGlow.addColorStop(1,   'rgba(0,0,80,0)');
        ctx.beginPath();
        ctx.arc(nx, ny+3*S, 3.5*S, 0, Math.PI * 2);
        ctx.fillStyle = nGlow;
        ctx.fill();
      }

      // ── Side weapon pods (small triple-barrel look) ───────────────────────
      // Left pod
      ctx.beginPath();
      ctx.roundRect(-22*S, 4*S, 8*S, 14*S, 3);
      ctx.fillStyle   = '#0d1a44';
      ctx.strokeStyle = '#3355aa';
      ctx.lineWidth   = 1;
      ctx.fill();
      ctx.stroke();
      // Left pod barrels
      for (let b = -2; b <= 2; b += 2) {
        ctx.beginPath();
        ctx.rect(-19*S + b*S, 2*S, 2*S, 6*S);
        ctx.fillStyle = '#223366';
        ctx.fill();
      }
      // Right pod
      ctx.beginPath();
      ctx.roundRect(14*S, 4*S, 8*S, 14*S, 3);
      ctx.fillStyle   = '#0d1a44';
      ctx.strokeStyle = '#3355aa';
      ctx.lineWidth   = 1;
      ctx.fill();
      ctx.stroke();
      for (let b = -2; b <= 2; b += 2) {
        ctx.beginPath();
        ctx.rect(17*S + b*S, 2*S, 2*S, 6*S);
        ctx.fillStyle = '#223366';
        ctx.fill();
      }

      // ── Overall blue metallic sheen overlay ──────────────────────────────
      ctx.shadowColor = '#2255ff';
      ctx.shadowBlur  = 12;
      ctx.beginPath();
      ctx.moveTo(0, -26*S);
      ctx.lineTo(-8*S, -18*S);
      ctx.lineTo(-14*S, 14*S);
      ctx.lineTo(14*S, 14*S);
      ctx.lineTo(8*S, -18*S);
      ctx.closePath();
      ctx.strokeStyle = 'rgba(100,160,255,0.3)';
      ctx.lineWidth   = 1;
      ctx.stroke();
      ctx.shadowBlur  = 0;

      ctx.restore();
    }

    function drawBullets() {
      ctx.fillStyle = '#ffe600';
      for (const b of bullets) {
        ctx.fillRect(b.x - b.width / 2, b.y, b.width, b.height);
      }
    }

    function drawEnemies() {
      for (const e of enemies) {
        drawEnemyShipByType(e, 0);
      }
    }

    function draw() {
      // Background + stars drawn together (includes deep space gradient + nebula)
      drawStars();
      drawEnergyWaves();
      drawParticles();
      drawEnemies();
      drawSmallEnemies();
      drawMeteors();
      drawBoss();
      drawPowerups();
      drawBullets();
      if (!gameOver) drawShip();
      drawBossWarning();
      drawScorePopups();
      drawScore();
      drawLives();
      drawRapidFireIndicator();
      if (gameOver) drawGameOver();
      drawPauseOverlay();
    }

    // ─── Game loop ────────────────────────────────────────────────────────────
    function gameLoop() {
      scheduleBGM();
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
